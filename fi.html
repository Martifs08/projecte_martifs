<!DOCTYPE html>
<title>Island Adventure</title>

<style>
    body {
        background-color: #f2f2f2;
        text-align: center;
        padding-top: 60px;
    }

    h1 {
        font-size: 2rem;
        margin-bottom: 20px;
        color: #333;
    }

    button {
        padding: 10px 20px;
        font-size: 1rem;
        border: 1px solid #333;
        background-color: white;
        cursor: pointer;
    }

    button:hover {
        background-color: #e6e6e6;
    }
</style>

<body> 
    <div>
        <h1>FINAL DEL JOC!!</h1>
        <p>Puntuació final: <span id="total"></span></p>
        <p>Resultat: <span id="missatge"></span></p>
        <p>Rècord: <span id="record"></span></p>
        <button onclick="window.location.href='pirate.html'">Reiniciar joc</button>
        <button onclick="window.location.href='inicijoc.html'">Torna a l'inici</button>
    </div>
</body>
<script>
    const total = sessionStorage.getItem("total") || 0;
    const gameMessage = sessionStorage.getItem("gameMessage");
    const record = localStorage.getItem("record") || 0;

    document.getElementById("total").textContent = total;
    document.getElementById("missatge").textContent = gameMessage;
    document.getElementById("record").textContent = record;
</script>
</html>
