<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Final del Joc · Island Adventure</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a0f0a 50%, #0d0603 100%);
    text-align: center;
    padding: 60px 20px;
    font-family: 'Courier New', 'Times New Roman', 'Georgia', monospace;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Fondo de mapa antiguo con efecto parchment */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        repeating-linear-gradient(45deg, rgba(139, 69, 19, 0.08) 0px, rgba(139, 69, 19, 0.08) 2px, transparent 2px, transparent 8px),
        repeating-linear-gradient(135deg, rgba(100, 50, 20, 0.05) 0px, rgba(100, 50, 20, 0.05) 1px, transparent 1px, transparent 6px);
    pointer-events: none;
    z-index: 0;
}

/* Partículas flotantes (arena/polvo mágico) */
body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(2px 2px at 20% 40%, rgba(212, 175, 55, 0.3), rgba(0,0,0,0)),
                      radial-gradient(1px 1px at 60% 80%, rgba(212, 165, 115, 0.2), rgba(0,0,0,0));
    background-size: 200px 200px, 150px 150px;
    background-repeat: repeat;
    pointer-events: none;
    animation: flotar 20s linear infinite;
    z-index: 0;
}

@keyframes flotar {
    0% { background-position: 0 0, 0 0; }
    100% { background-position: 200px 200px, 150px 150px; }
}

/* Contenedor principal con efecto pergamino - MÉS AMPLE */
.final-container {
    position: relative;
    z-index: 1;
    background: rgba(245, 235, 200, 0.92);
    backdrop-filter: blur(3px);
    max-width: 900px;        /* CANVIAT: abans 600px, ara 900px */
    width: 90%;              /* AFEGIT: perquè sigui responsive */
    margin: 0 auto;
    padding: 50px 40px;
    border-radius: 60px 60px 80px 80px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.5);
    border: 2px solid rgba(212, 175, 55, 0.6);
    transition: transform 0.3s ease;
}

.final-container:hover {
    transform: scale(1.02);
    box-shadow: 0 25px 60px rgba(0,0,0,0.7);
}

/* Decoración de calavera */
.final-container::before {
    content: "☠ ⚓ ☠";
    position: absolute;
    top: -25px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 2em;
    letter-spacing: 8px;
    color: #8b4513;
    text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
    background: rgba(245, 235, 200, 0.9);
    padding: 0 20px;
    border-radius: 30px;
}

/* Esquinas decorativas */
.final-container::after {
    content: "⚔";
    position: absolute;
    bottom: 15px;
    left: 20px;
    font-size: 1.5em;
    opacity: 0.5;
    color: #8b6914;
}

h1 {
    font-size: 2rem;
    margin-bottom: 25px;
    font-family: 'Times New Roman', 'Georgia', serif;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #5a2a0a;
    text-shadow: 3px 3px 0px rgba(184, 124, 58, 0.3);
    border-bottom: 2px solid #d4a373;
    display: inline-block;
    padding-bottom: 10px;
}

.subratllat {
    font-size: 1.1rem;
    border: none;
    margin-top: -10px;
    margin-bottom: 20px;
    font-family: 'Times New Roman', 'Georgia', serif;
    color: #6b4423;
}

p {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 1.1em;
    line-height: 1.6;
    color: #2a1a0a;
    margin: 18px 0;
    text-align: center;
    text-shadow: 0.5px 0.5px 0px rgba(255,255,255,0.5);
    letter-spacing: 0.5px;
}

.dada-destacada {
    font-size: 1.6rem;
    font-weight: bold;
    color: #c97e2a;
    background: rgba(90, 42, 10, 0.15);
    display: inline-block;
    padding: 5px 20px;
    border-radius: 40px;
    margin: 5px 0;
    font-family: 'Courier New', monospace;
}

.missatge-final {
    font-style: italic;
    background: rgba(212, 163, 115, 0.25);
    padding: 12px;
    border-radius: 30px;
    margin: 15px 0;
    border-left: 3px solid #b87c3a;
    border-right: 3px solid #b87c3a;
}

.record-box {
    background: linear-gradient(135deg, #2a1508 0%, #1a0a05 100%);
    display: inline-block;
    padding: 8px 25px;
    border-radius: 50px;
    margin-top: 10px;
    border: 1px solid #f0c060;
}

.record-box span {
    color: #f7d44a;
    font-size: 1.3rem;
    font-weight: bold;
}

.botons-final {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-top: 30px;
    flex-wrap: wrap;
}

button {
    margin-top: 10px;
    padding: 12px 28px;
    font-size: 1rem;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    border: 2px solid #b87c3a;
    background: linear-gradient(135deg, #4a2a15 0%, #2a1508 100%);
    color: #f0d890;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    border-radius: 40px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

button:hover {
    background: linear-gradient(135deg, #6a3a1a 0%, #3a1a0a 100%);
    transform: scale(1.05);
    box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5);
    border-color: #f0c060;
    color: #ffe8a0;
}

button:active {
    transform: scale(0.98);
}

/* Decoración de iconos alrededor del botón */
button::before {
    content: "⚔";
    position: absolute;
    left: -25px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.1em;
    opacity: 0;
    transition: all 0.3s;
}

button:hover::before {
    opacity: 1;
    left: -20px;
}

button::after {
    content: "⚔";
    position: absolute;
    right: -25px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.1em;
    opacity: 0;
    transition: all 0.3s;
}

button:hover::after {
    opacity: 1;
    right: -20px;
}

/* Animación de entrada */

    </style>
</head>
<body>

<div class="final-container">
    <h1>💀 FINAL DEL JOC!! 💀</h1>
    <div class="subratllat">La teva aventura ha arribat a la fi</div>
    
    <p>🏆 <strong>Puntuació final</strong> 🏆</p>
    <div class="dada-destacada" id="total">---</div>
    
    <div class="missatge-final">
        📜 <strong>Resultat:</strong> <span id="missatge"></span> 📜
    </div>
    
    <p>⭐ <strong>RÈCORD HISTÒRIC</strong> ⭐</p>
    <div class="record-box">
        <span id="record">---</span>
    </div>
    
    <div class="botons-final">
        <button onclick="window.location.href='pirate.html'">🔄 REINICIAR JOC</button>
        <button onclick="window.location.href='index.html'">🏠 TORNA A L'INICI</button>
    </div>
</div>

<script>
    const total = sessionStorage.getItem("total") || 0;
    const gameMessage = sessionStorage.getItem("gameMessage");
    const record = localStorage.getItem("record") || 0;

    document.getElementById("total").textContent = total;
    document.getElementById("missatge").textContent = gameMessage;
    document.getElementById("record").textContent = record;
</script>

</body>
</html>
